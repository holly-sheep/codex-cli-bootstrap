name: Validate

on:
  push:
  pull_request:

jobs:
  validate-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate bash installer syntax
        run: bash -n scripts/macos/install.sh

      - name: Validate Linux installer syntax
        run: bash -n scripts/linux/install.sh

      - name: Validate Codex release installer syntax
        run: bash -n scripts/codex/install-release.sh

      - name: Ensure shell scripts use LF endings
        run: |
          if find scripts tests -type f -name '*.sh' -print0 | xargs -0 grep $'\r' >/dev/null; then
            echo "CRLF detected in shell scripts."
            exit 1
          fi

      - name: Validate PowerShell installer syntax
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            "$PWD/scripts/windows/install.ps1",
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null

          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }

      - name: Run Linux installer smoke test
        run: bash tests/linux/install-smoke.sh

      - name: Run Codex release installer smoke test
        run: bash tests/codex/install-release-smoke.sh

      - name: Run Windows installer unit tests
        shell: pwsh
        run: ./tests/windows/install.tests.ps1
